[build]
  command = "npm run build"
  publish = ".next"
  ignore = "git diff --quiet HEAD^ HEAD ./"

[build.environment]
  NEXT_TELEMETRY_DISABLED = "1"

# Since we're using Next.js export, we don't need the Next.js plugin
# [[plugins]]
#   package = "@netlify/plugin-nextjs"

# Handle static files
[[redirects]]
  from = "/_next/static/*"
  to = "/static/:splat"
  status = 200

# Handle client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Prevent access to Next.js internal folders
[[headers]]
  for = "/_next/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"